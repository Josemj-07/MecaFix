name: CI Pipeline

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x server/gradlew  # ← Ruta correcta

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4  # ← Actualizado a v4
        with:
          gradle-version: wrapper

      - name: Verify code compilation
        working-directory: ./server  # ← Ejecutar desde server/
        run: ./gradlew classes testClasses --no-daemon

      - name: Run Tests
        working-directory: ./server
        run: ./gradlew test --no-daemon --continue  # ← --continue para ver todos los fallos

      - name: Build Artifact
        working-directory: ./server
        run: ./gradlew build -x test --no-daemon

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: application-artifact
          path: server/build/libs/*.jar
          retention-days: 7

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: server/build/reports/tests/test/
          retention-days: 7
